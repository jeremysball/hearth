services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: hearth
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: always

  app:
    image: ghcr.io/jeremysball/hearth:latest
    pull_policy: always
    labels:
      - "com.centurylinklabs.watchtower.scope=hearth"
    # Share tailscale's network namespace so app's port 443 is actually
    # reachable at https://hearth.<tailnet>.ts.net — a plain bridge network
    # alone doesn't expose a sibling container over the tailnet. This join
    # only happens at app's own startup, so if tailscale restarts on its
    # own, app is orphaned in the old namespace until it too restarts —
    # see the netns-watchdog service below.
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    env_file:
      - .env
    volumes:
      - hearth-data:/app/data
      - certs:/app/certs:ro
    restart: unless-stopped

  watchtower:
    image: nickfedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCOPE=hearth
    restart: unless-stopped

  netns-watchdog:
    image: docker:cli
    environment:
      - PROJECT_NAME=${COMPOSE_PROJECT_NAME:-hearth-prod}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/netns-watchdog.sh:/netns-watchdog.sh:ro
    entrypoint: ["/bin/sh", "/netns-watchdog.sh"]
    restart: unless-stopped

volumes:
  certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/certs
  tailscale-state:
  hearth-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/hearth-data
