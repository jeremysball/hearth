<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hearth — 3 Styles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<style>
  * { box-sizing: border-box; }

  /* ============ SHARED STRUCTURE ============ */
  .phone {
    --pad: 20px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ui);
    overflow: hidden;
  }
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 22px 4px; font-size: 12px; font-weight: 600; flex: 0 0 auto;
  }
  .statusbar .dots { display: flex; gap: 4px; }
  .statusbar .dots span { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .screen { flex: 1; display: flex; flex-direction: column; gap: 14px; padding: 6px var(--pad) 0; overflow: hidden; }

  .hd { display: flex; justify-content: space-between; align-items: flex-start; }
  .greet { font-size: 13px; color: var(--muted); font-weight: 500; }
  .baby { font-family: var(--display); font-size: 26px; font-weight: var(--display-wt); margin: 1px 0 0; line-height: 1.05; letter-spacing: var(--display-ls); }
  .age { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%; flex: 0 0 auto;
    background: var(--accent-soft); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--display); font-size: 19px; font-weight: 600;
    border: var(--avatar-bd);
  }

  .hero {
    background: var(--surface); border: var(--card-bd); border-radius: var(--r-lg);
    padding: 20px; box-shadow: var(--shadow);
  }
  .state { display: flex; align-items: center; gap: 8px; }
  .livedot { width: 9px; height: 9px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 4px var(--good-halo); }
  .state-lbl { font-size: 12px; color: var(--soft); font-weight: 600; letter-spacing: var(--micro-ls); text-transform: var(--micro-tt); font-family: var(--micro-ff); }
  .timer { font-family: var(--display); font-size: 46px; font-weight: var(--display-wt); line-height: 1; margin: 12px 0 6px; letter-spacing: var(--display-ls); }
  .timer .u { font-size: 24px; color: var(--muted); font-weight: 500; }
  .hero-sub { font-size: 13px; color: var(--soft); }
  .track { height: 8px; border-radius: 6px; background: var(--track-bg); margin-top: 16px; overflow: hidden; }
  .track i { display: block; height: 100%; background: var(--accent); border-radius: 6px; }
  .track-cap { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--muted); font-family: var(--micro-ff); letter-spacing: var(--micro-ls); }

  .sweet {
    background: var(--accent-tint); border: var(--accent-bd); border-radius: var(--r);
    padding: 13px 15px; display: flex; align-items: center; gap: 13px;
  }
  .sweet-ring {
    width: 40px; height: 40px; border-radius: 50%; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent); color: var(--on-accent); font-size: 19px;
  }
  .sweet-lbl { font-size: 10px; color: var(--accent-ink); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--micro-ff); }
  .sweet-win { font-family: var(--display); font-size: 18px; font-weight: var(--display-wt); margin-top: 2px; }
  .sweet-go { margin-left: auto; color: var(--accent-ink); font-size: 18px; opacity: 0.7; }

  .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
  .act { all: unset; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .tok {
    width: 46px; height: 46px; border-radius: var(--tok-r);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: var(--tok-bg); color: var(--tok-ink); border: var(--tok-bd);
  }
  .act.primary .tok { background: var(--accent); color: var(--on-accent); border-color: transparent; }
  .act-lbl { font-size: 11px; color: var(--soft); font-weight: 500; }

  .today-hd { display: flex; justify-content: space-between; align-items: baseline; }
  .today-hd h2 { font-family: var(--display); font-size: 17px; font-weight: var(--display-wt); margin: 0; letter-spacing: var(--display-ls); }
  .today-hd a { font-size: 12px; color: var(--accent-ink); font-weight: 600; }
  .log { background: var(--surface); border: var(--card-bd); border-radius: var(--r); overflow: hidden; margin-top: 10px; box-shadow: var(--shadow); }
  .row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; }
  .row + .row { border-top: 1px solid var(--hair); }
  .row-ic { width: 32px; height: 32px; border-radius: var(--tok-r); display: flex; align-items: center; justify-content: center; font-size: 15px; background: var(--rowic-bg); color: var(--rowic-ink); flex: 0 0 auto; }
  .row-txt { display: flex; flex-direction: column; }
  .what { font-size: 13px; font-weight: 600; }
  .when { font-size: 11px; color: var(--muted); }
  .meta { margin-left: auto; font-size: 12px; color: var(--soft); font-family: var(--micro-ff); font-weight: 600; }

  .tabbar {
    margin-top: auto; display: flex; justify-content: space-around; align-items: center;
    padding: 12px 0 16px; border-top: 1px solid var(--hair);
    background: var(--tabbar-bg);
    margin-left: calc(var(--pad) * -1); margin-right: calc(var(--pad) * -1);
  }
  .tab { font-size: 22px; color: var(--muted); }
  .tab.on { color: var(--accent-ink); }

  /* ============ V1 — WARM EDITORIAL ============ */
  .v1 {
    --bg: oklch(0.945 0.014 74); --surface: oklch(0.991 0.006 82);
    --ink: oklch(0.31 0.018 52); --soft: oklch(0.46 0.016 54); --muted: oklch(0.61 0.012 58);
    --hair: oklch(0.90 0.011 74);
    --accent: oklch(0.62 0.088 46); --accent-ink: oklch(0.52 0.09 44);
    --accent-soft: oklch(0.90 0.038 54); --accent-tint: oklch(0.955 0.018 60);
    --accent-bd: 1px solid oklch(0.90 0.038 54); --on-accent: oklch(0.985 0.01 80);
    --good: oklch(0.64 0.05 150); --good-halo: oklch(0.93 0.03 150);
    --display: "Newsreader", Georgia, serif; --display-wt: 500; --display-ls: 0;
    --ui: "Hanken Grotesk", sans-serif; --micro-ff: "Space Mono", monospace;
    --micro-ls: 0.04em; --micro-tt: none;
    --r: 16px; --r-lg: 22px; --tok-r: 14px;
    --card-bd: 1px solid oklch(0.90 0.011 74); --avatar-bd: 1px solid oklch(0.90 0.038 54);
    --tok-bg: oklch(0.991 0.006 82); --tok-ink: oklch(0.52 0.09 44); --tok-bd: 1px solid oklch(0.90 0.011 74);
    --rowic-bg: oklch(0.955 0.018 60); --rowic-ink: oklch(0.52 0.09 44);
    --track-bg: oklch(0.955 0.018 60); --tabbar-bg: oklch(0.991 0.006 82);
    --shadow: 0 1px 2px oklch(0.4 0.02 60 / 0.04);
  }

  /* ============ V2 — SOFT PASTEL / NURSERY ============ */
  .v2 {
    --bg: oklch(0.965 0.018 30); --surface: oklch(0.995 0.004 90);
    --ink: oklch(0.36 0.03 25); --soft: oklch(0.52 0.03 25); --muted: oklch(0.66 0.025 28);
    --hair: oklch(0.93 0.015 30);
    --accent: oklch(0.74 0.075 18); --accent-ink: oklch(0.60 0.085 18);
    --accent-soft: oklch(0.93 0.035 18); --accent-tint: oklch(0.965 0.022 22);
    --accent-bd: 1px solid oklch(0.93 0.035 18); --on-accent: oklch(0.995 0.004 90);
    --good: oklch(0.72 0.07 160); --good-halo: oklch(0.93 0.04 160);
    --display: "Quicksand", sans-serif; --display-wt: 700; --display-ls: -0.01em;
    --ui: "Nunito", sans-serif; --micro-ff: "Nunito", sans-serif;
    --micro-ls: 0.04em; --micro-tt: none;
    --r: 22px; --r-lg: 28px; --tok-r: 50%;
    --card-bd: none; --avatar-bd: none;
    --tok-bg: oklch(0.93 0.035 18); --tok-ink: oklch(0.60 0.085 18); --tok-bd: none;
    --rowic-bg: oklch(0.965 0.022 22); --rowic-ink: oklch(0.60 0.085 18);
    --track-bg: oklch(0.93 0.035 18); --tabbar-bg: oklch(0.995 0.004 90);
    --shadow: 0 6px 20px oklch(0.6 0.06 20 / 0.08);
  }
  .v2 .baby { letter-spacing: -0.015em; }
  .v2 .hero { background: linear-gradient(160deg, oklch(0.97 0.025 30), oklch(0.995 0.004 90)); }
  .v2 .sweet { background: oklch(0.93 0.04 160 / 0.5); border-color: transparent; }
  .v2 .sweet-ring { background: var(--good); }
  .v2 .sweet-lbl, .v2 .sweet-go { color: oklch(0.45 0.07 160); }

  /* ============ V3 — MODERN MINIMAL / MONO ============ */
  .v3 {
    --bg: oklch(0.965 0.004 80); --surface: oklch(1 0 0);
    --ink: oklch(0.22 0.012 60); --soft: oklch(0.42 0.012 60); --muted: oklch(0.60 0.008 62);
    --hair: oklch(0.91 0.005 80);
    --accent: oklch(0.58 0.13 42); --accent-ink: oklch(0.50 0.14 42);
    --accent-soft: oklch(0.93 0.03 50); --accent-tint: oklch(0.975 0.008 60);
    --accent-bd: 1px solid oklch(0.22 0.012 60); --on-accent: oklch(0.99 0.005 80);
    --good: oklch(0.58 0.12 145); --good-halo: oklch(0.92 0.04 145);
    --display: "Space Grotesk", sans-serif; --display-wt: 600; --display-ls: -0.02em;
    --ui: "Space Grotesk", sans-serif; --micro-ff: "Space Mono", monospace;
    --micro-ls: 0.1em; --micro-tt: uppercase;
    --r: 8px; --r-lg: 10px; --tok-r: 8px;
    --card-bd: 1px solid oklch(0.22 0.012 60); --avatar-bd: 1px solid oklch(0.22 0.012 60);
    --tok-bg: transparent; --tok-ink: oklch(0.22 0.012 60); --tok-bd: 1px solid oklch(0.22 0.012 60);
    --rowic-bg: transparent; --rowic-ink: oklch(0.22 0.012 60);
    --track-bg: oklch(0.91 0.005 80); --tabbar-bg: oklch(1 0 0);
    --shadow: none;
  }
  .v3 .avatar { background: oklch(0.22 0.012 60); color: oklch(0.99 0.005 80); }
  .v3 .hero { border-width: 1.5px; }
  .v3 .sweet { background: oklch(0.22 0.012 60); color: oklch(0.97 0.005 80); border-color: transparent; }
  .v3 .sweet-lbl { color: oklch(0.78 0.02 60); }
  .v3 .sweet-ring { background: var(--accent); color: var(--on-accent); }
  .v3 .sweet-win { color: oklch(0.97 0.005 80); }
  .v3 .sweet-go { color: oklch(0.78 0.02 60); }
  .v3 .row-ic { border: 1px solid var(--hair); }
  .v3 .state-lbl { font-weight: 700; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hearth.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { HearthScreen } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="styles"
          title="Hearth — three visual styles"
          subtitle="Same home-screen layout (Option A), three style directions. Compare type, color, shape & density.">
          <DCArtboard id="v1" label="1 · Warm Editorial — serif, clay, paper" width={360} height={812}>
            <HearthScreen variant="v1" />
          </DCArtboard>
          <DCArtboard id="v2" label="2 · Soft Pastel — rounded, nursery, gentle" width={360} height={812}>
            <HearthScreen variant="v2" />
          </DCArtboard>
          <DCArtboard id="v3" label="3 · Modern Minimal — mono, hairline, bold" width={360} height={812}>
            <HearthScreen variant="v3" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
